name: Deploy SSDT Database

# Пайплайн запускается при каждом пуше в ветку master (или main)
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Позволяет запускать пайплайн вручную из веб-интерфейса GitHub

jobs:
  build-and-deploy:
    # Указываем GitHub использовать ваш локальный Windows-воркер
    runs-on: self-hosted

    steps:
      # Шаг 1: Скачиваем актуальный код из репозитория на воркер
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Шаг 2: Находим MSBuild в системе (автоматически определяет путь к VS на вашем сервере)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Шаг 3: Находим утилиту NuGet (нужна для восстановления зависимостей, если они появятся)
      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      # Шаг 4: Восстанавливаем зависимости решения перед сборкой
      - name: Restore NuGet packages
        run: nuget restore Nexus.slnx

      # Шаг 5: Компилируем базу данных и публикуем её на локальный SQL Server
      # Здесь используется отлаженная цель Build,Publish для предотвращения ошибки отсутствия .dacpac файла
      - name: Build and Publish SSDT Project
        run: |
          msbuild /t:Build,Publish /p:SqlPublishProfilePath=Nexus.publish.xml /p:Configuration=Release
