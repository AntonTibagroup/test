name: Deployment Template

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      action_type:
        required: false
        type: string

jobs:
  deploy:
    runs-on: self-hosted

    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Environment check
        run: echo "Building for ${{ inputs.environment }}..."

      # - name: Setup MSBuild
        # uses: microsoft/setup-msbuild@v2

      - name: Build SSDT Project (.sqlproj)
        working-directory: Nexus
        run: |
          msbuild /t:Build /p:Configuration=Release Nexus.sqlproj

      - name: Publish dacpac structure to Remote Template DB
        working-directory: Nexus
        shell: pwsh
        run: |
            $sqlpackage = "C:\Program Files\Microsoft Visual Studio\18\Insiders\Common7\IDE\Extensions\Microsoft\SQLDB\DAC\SqlPackage.exe"
            if (-not (Test-Path $sqlpackage)) {
                Write-Error "SqlPackage not found"
                exit 1
            }
            & $sqlpackage `
            /Action:Publish `
            /SourceFile:"bin\Release\Nexus.dacpac" `
            /TargetServerName:"${{ vars.DB_SERVER }}" `
            /TargetDatabaseName:"${{ vars.DB_NAME }}" `
            /p:AllowDropBlockingDatabaseObjects=True `
            /p:BlockOnPossibleDataLoss=True `
            /p:DropObjectsNotInSource=False